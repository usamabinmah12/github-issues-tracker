<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        *{
            font-family: "Geist", sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div class=" flex  justify-center ">
        <div class="bg-[#FFFFFF]   max-w-5/12 text-center flex flex-col justify-center items-center">
            <img src="./assets/github-logo.png" alt="">
            <h3 class="text-3xl">GitHub Issues Tracker</h3>
            <p>Sign in to manage your issues</p>
           
        </div>
       
        
    </div>
    <div class="flex  justify-center  my-11">
        <fieldset class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
        <legend class="fieldset-legend"></legend>

        <label class="label">Email</label>
        <input id="user" type="email" class="input" placeholder="Enter username  admin" />

        <label class="label">Password</label>
        <input id="pass" type="password" class="input" placeholder="Enter Password  admin123" />

        <button  onclick="verify()" class="btn btn-primary mt-4">Sign in</button>
        </fieldset>
        
    </div>
    <div class="">
            <div class="flex flex-col items-center justify-center">
                <p class="font-2xl font-bold">Demo Credientials</p>
                <p class="font-semibold">username : <span class="font-normal">admin</span></p>
               <p class="font-semibold">password : <span class="font-normal">admin123</span></p> 
            </div>
        </div>
        <script src="./script/script.js"></script>
     
</body>
</html>
